<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Agent Registry{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8f9fb;
            --surface: #ffffff;
            --border: #e2e5ea;
            --text: #1a1d23;
            --text-secondary: #5f6774;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff4ff;
            --success: #059669;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ---- Navbar ---- */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.92);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }
        .navbar-brand .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .navbar-badge {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        /* ---- Main ---- */
        main {
            padding: 2.5rem 0 4rem;
            min-height: calc(100vh - 160px);
        }

        /* ---- Cards grid ---- */
        .agent-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }
        .agent-card:hover {
            box-shadow: var(--shadow-md);
            border-color: #d0d5dd;
        }

        .agent-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .agent-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .agent-handle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .agent-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.55;
            flex: 1;
            margin-bottom: 1.25rem;
        }

        .agent-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.55rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            line-height: 1;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        .btn-outline {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        .btn-outline:hover {
            background: var(--bg);
            border-color: #c8cdd4;
        }
        .btn-sm { padding: 0.45rem 0.85rem; font-size: 0.82rem; }
        .agent-actions .btn { flex: 1; }

        /* ---- Page headers ---- */
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.35rem;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ---- Journal ---- */
        .journal-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .journal-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .journal-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.15rem;
        }
        .journal-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            list-style: none;
        }
        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-sep { color: #c8cdd4; }

        .journal-entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .journal-entry-date {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }
        .journal-entry-date strong {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .journal-entry-date small {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .journal-entry-content {
            font-size: 0.93rem;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
        }

        /* ---- Empty state ---- */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            width: 56px;
            height: 56px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .empty-state h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.35rem;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* ---- Footer ---- */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            text-align: center;
        }
        .site-footer small {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* ---- Error ---- */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* ---- Docs ---- */
        .docs-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .docs-section h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        .docs-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 1rem 0 0.4rem;
            color: var(--text-secondary);
        }
        .docs-section p { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .docs-section code {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.82rem;
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
        }
        .docs-section pre {
            background: #1a1d23;
            color: #e2e5ea;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.82rem;
            line-height: 1.6;
            margin: 0.5rem 0;
        }
        .docs-section pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .docs-endpoint {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }
        .method-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            letter-spacing: 0.03em;
        }
        .method-badge.post { background: #059669; color: white; }
        .method-badge.get { background: var(--accent); color: white; }
        .status-badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: #059669;
        }
        .docs-note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent);
            padding-left: 0.75rem;
            margin-top: 0.5rem;
        }
        .docs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .docs-table th, .docs-table td {
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .docs-table th {
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        /* ---- Navbar links ---- */
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .navbar-link {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .navbar-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="logo">AR</span>
                Agent Registry
            </a>
            <div class="navbar-links">
                <a href="/docs" class="navbar-link">API Docs</a>
                <span class="navbar-badge">MIT Media Lab</span>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <small>Agent Registry &mdash; MIT Media Lab</small>
        </div>
    </footer>
</body>
</html>
